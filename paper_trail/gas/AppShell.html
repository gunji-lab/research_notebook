<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PaperTrail</title>

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #f7f5f1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #f7f5f1;
    }
  </style>
</head>

<body>
  <iframe id="papertrailApp" title="PaperTrail"></iframe>

  <script>
  (() => {
    const FRONTEND_URL = <?!= JSON.stringify(frontendUrl) ?>;
    const FRONTEND_ORIGIN = <?!= JSON.stringify(frontendOrigin) ?>;
    const AUTH_TOKEN = <?!= JSON.stringify(authToken) ?>;
    const ROUTE = <?!= JSON.stringify(route || "") ?>;
    const frame = document.getElementById("papertrailApp");

    const API_METHODS = {
      "papertrail:whoAmI": "whoAmI",
      "papertrail:saveProfile": "saveProfile",
      "papertrail:saveNotebook": "saveNotebook",
      "papertrail:listMyNotebooks": "listMyNotebooks",
      "papertrail:getMyNotebookDebug": "getMyNotebookDebug",
      "papertrail:listLabNotebooks": "listLabNotebooks",
      "papertrail:getNotebook": "getNotebook",
      "papertrail:saveTrail": "saveTrail",
      "papertrail:getDashboard": "getDashboard",
      "papertrail:openAlexSearch": "openAlexSearch",
      "papertrail:openAlexWorkByDoi": "openAlexWorkByDoi"
    };

    function routedFrontendUrl() {
      const url = new URL(FRONTEND_URL);
      const pageRoutes = {
        home: "index.html",
        mine: "my_notebook.html",
        lab: "lab_notebook.html",
        dashboard: "dashboard.html",
        new: "notebook.html"
      };
      const page = pageRoutes[ROUTE] || "";

      if (!page) {
        return {
          url,
          consumeRouteInHash: Boolean(ROUTE)
        };
      }

      url.hash = "";
      url.search = "";
      const basePath = url.pathname.endsWith("/")
        ? url.pathname
        : /\.[^/]+$/.test(url.pathname)
          ? url.pathname.replace(/\/[^/]*$/, "/")
          : url.pathname + "/";
      url.pathname = basePath + page;

      return {
        url,
        consumeRouteInHash: false
      };
    }

    function appUrlWithToken() {
      const routed = routedFrontendUrl();
      const url = routed.url;

      if (!url.pathname.endsWith("/") && !/\.[^/]+$/.test(url.pathname)) {
        url.pathname += "/";
      }

      url.hash = "auth=" + encodeURIComponent(AUTH_TOKEN)
        + (routed.consumeRouteInHash ? "&route=" + encodeURIComponent(ROUTE) : "");
      return url.toString();
    }

    function postResult(requestId, payload) {
      if (!frame.contentWindow || !requestId) return;
      frame.contentWindow.postMessage(
        Object.assign({ type: "papertrail:result", requestId }, payload),
        FRONTEND_ORIGIN
      );
    }

    window.addEventListener("message", event => {
      if (event.source !== frame.contentWindow || event.origin !== FRONTEND_ORIGIN) return;

      const request = event.data || {};
      const method = API_METHODS[request.type];
      if (!method || !request.requestId) return;

      const payload = request.payload || {};
      google.script.run
        .withSuccessHandler(response => {
          const ok = Boolean(response && response.ok);
          postResult(request.requestId, {
            ok,
            result: response && response.data,
            error: response && response.error
          });
        })
        .withFailureHandler(error => {
          postResult(request.requestId, {
            ok: false,
            error: error && error.message ? error.message : String(error)
          });
        })
        .paperTrailApiRequest({
          method,
          args: payload.args || {},
          authToken: payload.authToken || AUTH_TOKEN
        });
    });

    frame.src = appUrlWithToken();
  })();
  </script>
</body>
</html>
