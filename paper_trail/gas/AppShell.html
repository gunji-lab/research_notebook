<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PaperTrail</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #f7f5f1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #f7f5f1;
    }
  </style>
</head>
<body>
  <iframe id="papertrailApp" title="PaperTrail"></iframe>
  <script>
  (() => {
    const FRONTEND_URL = <?!= JSON.stringify(frontendUrl) ?>;
    const FRONTEND_ORIGIN = <?!= JSON.stringify(frontendOrigin) ?>;
    const AUTH_TOKEN = <?!= JSON.stringify(authToken) ?>;
    const frame = document.getElementById("papertrailApp");

    function appUrlWithToken() {
      const url = new URL(FRONTEND_URL);
      if (!url.pathname.endsWith("/") && !/\.[^/]+$/.test(url.pathname)) {
        url.pathname += "/";
      }
      url.hash = "auth=" + encodeURIComponent(AUTH_TOKEN);
      return url.toString();
    }

    function postToApp(payload) {
      if (!frame.contentWindow) return;
      frame.contentWindow.postMessage(payload, "*");
    }

    function announceReady(bridgeId) {
      postToApp({
        type: "papertrail:bridge-ready",
        bridgeId: bridgeId || "papertrail-gas-shell"
      });
    }

    window.addEventListener("message", event => {
      if (event.source !== frame.contentWindow) return;
      if (event.origin !== FRONTEND_ORIGIN) return;
      const request = event.data || {};

      if (request.type === "papertrail:hello") {
        announceReady(request.bridgeId);
        return;
      }

      if (request.type !== "papertrail:request" || !request.id) return;

      google.script.run
        .withSuccessHandler(result => {
          postToApp({
            type: "papertrail:response",
            bridgeId: request.bridgeId,
            id: request.id,
            ok: Boolean(result && result.ok),
            data: result && result.data,
            error: result && result.error
          });
        })
        .withFailureHandler(error => {
          postToApp({
            type: "papertrail:response",
            bridgeId: request.bridgeId,
            id: request.id,
            ok: false,
            error: error && error.message ? error.message : String(error)
          });
        })
        .bridgeRequest({
          method: request.method,
          args: request.args || {},
          authToken: request.authToken || AUTH_TOKEN
        });
    });

    frame.addEventListener("load", () => {
      announceReady("papertrail-gas-shell");
    });

    frame.src = appUrlWithToken();
  })();
  </script>
</body>
</html>
