<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PaperTrail API Bridge</title>
</head>
<body>
<script>
(() => {
  const ALLOWED_ORIGIN = new URL(<?!= JSON.stringify(frontendOrigin) ?>).origin;
  const BRIDGE_ID = <?!= JSON.stringify(bridgeId) ?>;

  function reply(target, origin, payload) {
    target.postMessage(Object.assign({bridgeId: BRIDGE_ID}, payload), origin);
  }

  function announceReady() {
    const payload = {type:"papertrail:bridge-ready", bridgeId: BRIDGE_ID};
    try { parent.postMessage(payload, "*"); } catch (_) {}
    try {
      if (top !== parent) top.postMessage(payload, ALLOWED_ORIGIN);
    } catch (_) {}
  }

  window.addEventListener("message", event => {
    if (event.origin !== ALLOWED_ORIGIN) return;
    const request = event.data || {};
    if (request.bridgeId !== BRIDGE_ID) return;
    if (request.type !== "papertrail:request" || !request.id) return;

    google.script.run
      .withSuccessHandler(result => {
        reply(event.source, event.origin, {
          type: "papertrail:response",
          id: request.id,
          ok: Boolean(result && result.ok),
          data: result && result.data,
          error: result && result.error
        });
      })
      .withFailureHandler(error => {
        reply(event.source, event.origin, {
          type: "papertrail:response",
          id: request.id,
          ok: false,
          error: error && error.message ? error.message : String(error)
        });
      })
      .bridgeRequest({
        method: request.method,
        args: request.args || {},
        authToken: request.authToken || ""
      });
  });

  announceReady();
  setTimeout(announceReady, 500);
  setTimeout(announceReady, 1500);
})();
</script>
</body>
</html>
